name: Daily Travel Tracker

on:
  schedule:
    - cron: '0 8 * * *' # 8:00 AM UTC -> 10:00/11:00 AM Greece
  workflow_dispatch: # Manual trigger

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit snapshots

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Run Tracker
      run: python travel_tracker.py

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: dashboard/package-lock.json

    - name: Install React Dependencies & Build
      run: |
        cd dashboard
        npm ci
        npm run build

    - name: Commit new snapshot
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add dashboard/public/snapshot.json dashboard/public/trips.json snapshots/*.json history.csv
        git commit -m "Auto-update: Daily travel snapshot" || exit 0
        git pull --rebase origin main
        git push

    - name: Deploy to Netlify
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: c7d2b081-f0e0-4b0c-8f57-bfc4fa8e50b6
      run: |
        if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
          echo "::warning::Το secret NETLIFY_AUTH_TOKEN δεν έχει οριστεί (Settings → Secrets and variables → Actions). Παράλειψη CLI deploy — αν το site είναι συνδεδεμένο με το GitHub repo στο Netlify, θα γίνει deploy αυτόματα από το push."
          exit 0
        fi
        npx netlify-cli deploy --prod --dir=dashboard/dist

name: Deploy Dashboard to GitHub Pages

# Κάνει deploy το dashboard όταν αλλάξει ο κώδικάς του (ή χειροκίνητα).
# Το καθημερινό scrape.yml κάνει το δικό του deploy μετά το scraping —
# αυτό εδώ χρειάζεται γιατί τα pushes του Action δεν σκανδαλίζουν άλλα workflows.

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    concurrency:
      group: github-pages
      cancel-in-progress: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: dashboard/package-lock.json

    - name: Build dashboard
      run: |
        cd dashboard
        npm ci
        npm run build

    - name: Deploy to GitHub Pages (gh-pages branch)
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: dashboard/dist
